<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #7c6af7;
      letter-spacing: 0.5px;
    }

    header span {
      font-size: 12px;
      color: #64748b;
    }

    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      width: 55%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2d3148;
      overflow-y: auto;
    }

    /* URL BAR */
    .url-bar {
      display: flex;
      gap: 8px;
      padding: 16px;
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
    }

    select#method {
      background: #252840;
      color: #7c6af7;
      border: 1px solid #3d4166;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      outline: none;
    }

    select#method:focus { border-color: #7c6af7; }

    input#url {
      flex: 1;
      background: #252840;
      color: #e2e8f0;
      border: 1px solid #3d4166;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 13px;
      outline: none;
    }

    input#url:focus { border-color: #7c6af7; }
    input#url::placeholder { color: #4a5278; }

    button#send-btn {
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button#send-btn:hover { background: #6a58e0; }
    button#send-btn:disabled { background: #3d4166; color: #64748b; cursor: not-allowed; }

    /* TABS */
    .tabs {
      display: flex;
      background: #151722;
      border-bottom: 1px solid #2d3148;
      padding: 0 16px;
    }

    .tab-btn {
      background: none;
      border: none;
      color: #64748b;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tab-btn.active { color: #7c6af7; border-bottom-color: #7c6af7; }
    .tab-btn:hover:not(.active) { color: #94a3b8; }

    .tab-content { display: none; padding: 16px; flex: 1; }
    .tab-content.active { display: flex; flex-direction: column; gap: 8px; }

    /* KV ROWS */
    .kv-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .kv-row input {
      flex: 1;
      background: #1e2235;
      color: #e2e8f0;
      border: 1px solid #2d3148;
      border-radius: 5px;
      padding: 7px 10px;
      font-size: 12px;
      outline: none;
    }

    .kv-row input:focus { border-color: #7c6af7; }
    .kv-row input::placeholder { color: #4a5278; }

    .kv-row button.remove-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    .kv-row button.remove-btn:hover { color: #f87171; background: #2d1b1b; }

    .add-row-btn {
      background: none;
      border: 1px dashed #3d4166;
      color: #4a5278;
      border-radius: 5px;
      padding: 7px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .add-row-btn:hover { border-color: #7c6af7; color: #7c6af7; background: #1a1d2e; }

    /* BODY TAB */
    #body-content {
      flex-direction: column;
      gap: 10px;
    }

    .body-type-row {
      display: flex;
      gap: 6px;
    }

    .body-type-btn {
      background: #1e2235;
      border: 1px solid #2d3148;
      color: #64748b;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .body-type-btn.active { background: #2a2460; border-color: #7c6af7; color: #7c6af7; }

    textarea#body-raw {
      flex: 1;
      background: #1e2235;
      color: #a5d6a7;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      resize: vertical;
      min-height: 200px;
      outline: none;
      line-height: 1.6;
    }

    textarea#body-raw:focus { border-color: #7c6af7; }
    textarea#body-raw::placeholder { color: #4a5278; }

    #body-form-fields { display: flex; flex-direction: column; gap: 8px; }

    /* AUTH TAB */
    #auth-content { flex-direction: column; gap: 10px; }

    select#auth-type {
      background: #1e2235;
      color: #e2e8f0;
      border: 1px solid #2d3148;
      border-radius: 5px;
      padding: 8px 12px;
      font-size: 12px;
      outline: none;
      width: 200px;
    }

    select#auth-type:focus { border-color: #7c6af7; }

    #auth-fields { display: flex; flex-direction: column; gap: 8px; }

    .auth-input {
      background: #1e2235;
      color: #e2e8f0;
      border: 1px solid #2d3148;
      border-radius: 5px;
      padding: 8px 12px;
      font-size: 12px;
      outline: none;
      width: 100%;
    }

    .auth-input:focus { border-color: #7c6af7; }
    .auth-input::placeholder { color: #4a5278; }

    label.field-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      width: 45%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .response-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
    }

    .response-meta { display: flex; gap: 16px; }

    .meta-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3d4166;
    }

    .status-dot.success { background: #22c55e; }
    .status-dot.redirect { background: #f59e0b; }
    .status-dot.client-err { background: #f87171; }
    .status-dot.server-err { background: #ef4444; }

    #status-text { color: #e2e8f0; }
    #time-text { color: #64748b; }

    .response-tabs { display: flex; background: #151722; border-bottom: 1px solid #2d3148; padding: 0 16px; }

    .response-body-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #0f1117;
    }

    pre#response-body {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      color: #a5d6a7;
    }

    #response-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: #3d4166;
    }

    #response-placeholder svg { opacity: 0.4; }
    #response-placeholder p { font-size: 13px; }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #2d3148;
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #response-headers-area {
      display: none;
      padding: 16px;
      overflow-y: auto;
      flex: 1;
    }

    .resp-header-row {
      display: flex;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #1e2235;
      font-size: 12px;
    }

    .resp-header-key { color: #7c6af7; min-width: 200px; }
    .resp-header-val { color: #94a3b8; word-break: break-all; }

    .copy-btn {
      background: none;
      border: 1px solid #2d3148;
      color: #64748b;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover { border-color: #7c6af7; color: #7c6af7; }

    .error-msg {
      color: #f87171;
      font-size: 13px;
      padding: 12px;
      background: #2d1b1b;
      border: 1px solid #7f1d1d;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7c6af7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/>
  </svg>
  <h1>API Tester</h1>
  <span>A lightweight Postman alternative</span>
</header>

<div class="container">

  <!-- ════ LEFT PANEL ════ -->
  <div class="left-panel">

    <!-- URL Bar -->
    <div class="url-bar">
      <select id="method">
        <option>GET</option>
        <option>POST</option>
        <option>PUT</option>
        <option>PATCH</option>
        <option>DELETE</option>
        <option>HEAD</option>
        <option>OPTIONS</option>
      </select>
      <input id="url" type="text" placeholder="https://api.example.com/endpoint" />
      <button id="send-btn" onclick="sendRequest()">Send</button>
    </div>

    <!-- Request Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('params')">Params</button>
      <button class="tab-btn" onclick="switchTab('headers')">Headers</button>
      <button class="tab-btn" onclick="switchTab('body')">Body</button>
      <button class="tab-btn" onclick="switchTab('auth')">Auth</button>
    </div>

    <!-- PARAMS TAB -->
    <div id="params-content" class="tab-content active">
      <div id="params-rows"></div>
      <button class="add-row-btn" onclick="addRow('params')">+ Add Parameter</button>
    </div>

    <!-- HEADERS TAB -->
    <div id="headers-content" class="tab-content">
      <div id="headers-rows"></div>
      <button class="add-row-btn" onclick="addRow('headers')">+ Add Header</button>
    </div>

    <!-- BODY TAB -->
    <div id="body-content" class="tab-content">
      <div class="body-type-row">
        <button class="body-type-btn active" onclick="setBodyType('raw')">Raw JSON</button>
        <button class="body-type-btn" onclick="setBodyType('form')">Form Data</button>
        <button class="body-type-btn" onclick="setBodyType('none')">None</button>
      </div>
      <textarea id="body-raw" placeholder='{\n  "key": "value"\n}'></textarea>
      <div id="body-form-fields" style="display:none">
        <div id="form-rows"></div>
        <button class="add-row-btn" onclick="addRow('form')">+ Add Field</button>
      </div>
    </div>

    <!-- AUTH TAB -->
    <div id="auth-content" class="tab-content">
      <div>
        <label class="field-label">Auth Type</label>
        <select id="auth-type" onchange="renderAuthFields()">
          <option value="none">No Auth</option>
          <option value="bearer">Bearer Token</option>
          <option value="basic">Basic Auth</option>
          <option value="api-key">API Key</option>
        </select>
      </div>
      <div id="auth-fields"></div>
    </div>

  </div><!-- /left-panel -->

  <!-- ════ RIGHT PANEL ════ -->
  <div class="right-panel">

    <div class="response-header">
      <span>Response</span>
      <div class="response-meta">
        <div class="meta-badge">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">—</span>
        </div>
        <span id="time-text">—</span>
        <button class="copy-btn" onclick="copyResponse()">Copy</button>
      </div>
    </div>

    <div class="response-tabs">
      <button class="tab-btn active" onclick="switchRespTab('body')">Body</button>
      <button class="tab-btn" onclick="switchRespTab('headers')">Headers</button>
    </div>

    <div class="response-body-area" id="resp-body-area">
      <div id="response-placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p>Hit <strong>Send</strong> to get a response</p>
      </div>
      <pre id="response-body" style="display:none"></pre>
    </div>

    <div id="response-headers-area"></div>

  </div><!-- /right-panel -->

</div><!-- /container -->

<script>
  // ── STATE ──────────────────────────────────────────────
  let bodyType = 'raw';
  let respHeaders = {};

  // ── TABS ───────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.left-panel .tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(name + '-content').classList.add('active');
  }

  function switchRespTab(name) {
    document.querySelectorAll('.response-tabs .tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    const bodyArea = document.getElementById('resp-body-area');
    const headersArea = document.getElementById('response-headers-area');
    if (name === 'body') {
      bodyArea.style.display = 'block';
      headersArea.style.display = 'none';
    } else {
      bodyArea.style.display = 'none';
      headersArea.style.display = 'block';
    }
  }

  // ── KV ROWS ────────────────────────────────────────────
  function addRow(type) {
    const containerId = { params: 'params-rows', headers: 'headers-rows', form: 'form-rows' }[type];
    const container = document.getElementById(containerId);
    const placeholder = { params: ['Key', 'Value'], headers: ['Header Name', 'Value'], form: ['Field', 'Value'] }[type];
    const row = document.createElement('div');
    row.className = 'kv-row';
    row.innerHTML = `
      <input type="text" placeholder="${placeholder[0]}" />
      <input type="text" placeholder="${placeholder[1]}" />
      <button class="remove-btn" onclick="this.parentElement.remove()" title="Remove">×</button>`;
    container.appendChild(row);
  }

  function getKVPairs(containerId) {
    const pairs = {};
    document.querySelectorAll(`#${containerId} .kv-row`).forEach(row => {
      const inputs = row.querySelectorAll('input');
      const k = inputs[0].value.trim();
      const v = inputs[1].value.trim();
      if (k) pairs[k] = v;
    });
    return pairs;
  }

  // ── BODY TYPE ──────────────────────────────────────────
  function setBodyType(type) {
    bodyType = type;
    document.querySelectorAll('.body-type-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('body-raw').style.display = type === 'raw' ? 'block' : 'none';
    document.getElementById('body-form-fields').style.display = type === 'form' ? 'flex' : 'none';
  }

  // ── AUTH ───────────────────────────────────────────────
  function renderAuthFields() {
    const type = document.getElementById('auth-type').value;
    const container = document.getElementById('auth-fields');
    const templates = {
      none: '',
      bearer: `<label class="field-label">Token</label>
               <input class="auth-input" id="auth-token" type="text" placeholder="Enter bearer token..." />`,
      basic: `<label class="field-label">Username</label>
              <input class="auth-input" id="auth-username" type="text" placeholder="Username" />
              <label class="field-label" style="margin-top:6px">Password</label>
              <input class="auth-input" id="auth-password" type="password" placeholder="Password" />`,
      'api-key': `<label class="field-label">Header Name</label>
                  <input class="auth-input" id="auth-key-name" type="text" placeholder="X-API-Key" />
                  <label class="field-label" style="margin-top:6px">Value</label>
                  <input class="auth-input" id="auth-key-val" type="text" placeholder="your-api-key" />`
    };
    container.innerHTML = templates[type] || '';
  }

  function buildAuthHeader() {
    const type = document.getElementById('auth-type').value;
    if (type === 'bearer') {
      const token = document.getElementById('auth-token')?.value.trim();
      if (token) return { Authorization: `Bearer ${token}` };
    } else if (type === 'basic') {
      const u = document.getElementById('auth-username')?.value.trim();
      const p = document.getElementById('auth-password')?.value.trim();
      if (u) return { Authorization: `Basic ${btoa(u + ':' + p)}` };
    } else if (type === 'api-key') {
      const name = document.getElementById('auth-key-name')?.value.trim();
      const val  = document.getElementById('auth-key-val')?.value.trim();
      if (name && val) return { [name]: val };
    }
    return {};
  }

  // ── SEND REQUEST ───────────────────────────────────────
  async function sendRequest() {
    let url = document.getElementById('url').value.trim();
    if (!url) { alert('Please enter a URL'); return; }

    const method  = document.getElementById('method').value;
    const params  = getKVPairs('params-rows');
    const headers = { ...getKVPairs('headers-rows'), ...buildAuthHeader() };

    // Append query params
    if (Object.keys(params).length) {
      const qs = new URLSearchParams(params).toString();
      url += (url.includes('?') ? '&' : '?') + qs;
    }

    // Build body
    let body = undefined;
    if (!['GET', 'HEAD'].includes(method)) {
      if (bodyType === 'raw') {
        const raw = document.getElementById('body-raw').value.trim();
        if (raw) {
          body = raw;
          if (!headers['Content-Type']) headers['Content-Type'] = 'application/json';
        }
      } else if (bodyType === 'form') {
        const formData = new URLSearchParams(getKVPairs('form-rows')).toString();
        if (formData) {
          body = formData;
          if (!headers['Content-Type']) headers['Content-Type'] = 'application/x-www-form-urlencoded';
        }
      }
    }

    // Show loading
    setLoading(true);

    const start = Date.now();
    try {
      const res = await fetch(url, { method, headers, body });
      const elapsed = Date.now() - start;
      const text = await res.text();
      respHeaders = {};
      res.headers.forEach((v, k) => { respHeaders[k] = v; });

      showResponse(res.status, res.statusText, elapsed, text);
    } catch (err) {
      setLoading(false);
      showError(err.message);
    }
  }

  // ── UI HELPERS ─────────────────────────────────────────
  function setLoading(on) {
    const btn = document.getElementById('send-btn');
    const placeholder = document.getElementById('response-placeholder');
    const pre = document.getElementById('response-body');
    btn.disabled = on;
    btn.textContent = on ? 'Sending…' : 'Send';
    if (on) {
      pre.style.display = 'none';
      placeholder.innerHTML = '<div class="loading-spinner"></div><p>Waiting for response…</p>';
    }
  }

  function showResponse(status, statusText, ms, text) {
    setLoading(false);

    // Status badge
    const dot = document.getElementById('status-dot');
    dot.className = 'status-dot';
    if (status >= 200 && status < 300) dot.classList.add('success');
    else if (status >= 300 && status < 400) dot.classList.add('redirect');
    else if (status >= 400 && status < 500) dot.classList.add('client-err');
    else dot.classList.add('server-err');

    document.getElementById('status-text').textContent = `${status} ${statusText}`;
    document.getElementById('time-text').textContent    = `${ms} ms`;

    // Body
    document.getElementById('response-placeholder').style.display = 'none';
    const pre = document.getElementById('response-body');
    pre.style.display = 'block';

    try {
      pre.textContent = JSON.stringify(JSON.parse(text), null, 2);
    } catch {
      pre.textContent = text;
    }

    // Response headers panel
    const hArea = document.getElementById('response-headers-area');
    hArea.innerHTML = Object.entries(respHeaders).map(([k, v]) =>
      `<div class="resp-header-row"><span class="resp-header-key">${k}</span><span class="resp-header-val">${v}</span></div>`
    ).join('');
  }

  function showError(msg) {
    document.getElementById('response-placeholder').style.display = 'none';
    const pre = document.getElementById('response-body');
    pre.style.display = 'block';
    pre.innerHTML = `<div class="error-msg">Error: ${msg}<br><br>This may be due to CORS restrictions when calling from a browser. Try using a CORS-enabled API or a local server.</div>`;
    document.getElementById('status-text').textContent = 'Error';
    document.getElementById('time-text').textContent   = '—';
    document.getElementById('status-dot').className    = 'status-dot server-err';
  }

  function copyResponse() {
    const text = document.getElementById('response-body').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = event.target;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }

  // ── INIT ───────────────────────────────────────────────
  // Pre-add one row each for convenience
  addRow('headers');
  addRow('params');
</script>
</body>
</html>
